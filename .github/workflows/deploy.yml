name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start SSH agent (built-in)
        run: |
          set -e
          eval "$(ssh-agent -s)"
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-add ~/.ssh/deploy_key

      - name: Test SSH connection (debug)
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          set -x
          echo "Testing SSH to: $SSH_USER@$SSH_HOST"
          ssh -vvv -o StrictHostKeyChecking=no -o BatchMode=yes -i ~/.ssh/deploy_key "$SSH_USER@$SSH_HOST" "echo SSH_CONNECTION_OK" || true

      - name: Sync repository to server (rsync)
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          APP_DIR: ${{ secrets.APP_DIR }}
        run: |
          set -e
          echo "Syncing to $SSH_USER@$SSH_HOST:$APP_DIR"
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=no "$SSH_USER@$SSH_HOST" "mkdir -p $APP_DIR"
          rsync -e "ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=no" -avz --delete --exclude='.git' --exclude='.github' --exclude='node_modules' ./ "$SSH_USER@$SSH_HOST:$APP_DIR/"

      - name: Run docker-compose on server
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          APP_DIR: ${{ secrets.APP_DIR }}
        run: |
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=no "$SSH_USER@$SSH_HOST" "cd $APP_DIR && docker-compose pull || true && docker-compose up -d --build app --remove-orphans"
